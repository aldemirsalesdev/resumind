<!doctype html>
<html lang="pt-BR" translate="no" style="background-color: #050505;" class="dark">
  <head>
    <!-- Prevent White Flash/Screen loading before any stylesheets or scripts are loaded -->
    <style>
      html, body {
        background-color: #050505 !important;
      }
      /* Detect saved theme immediately to style accordingly */
      html.light, html.light body {
        background-color: #f8fafc !important;
      }
    </style>
    <!-- Theme and Flash Prevention Script -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          } else {
            document.documentElement.classList.add('light');
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();

      // Auto-reload on chunk/module load failures (very common during/after new deployments)
      window.addEventListener('error', function(e) {
        var msg = (e.message || '').toLowerCase();
        var isChunkError = msg.indexOf('importing a module script failed') !== -1 || 
                           msg.indexOf('failed to fetch dynamically imported module') !== -1 ||
                           msg.indexOf('unexpected token') !== -1;
        if (isChunkError) {
          console.warn('Sincronizando com a última versão do servidor...');
          window.location.reload();
        }
      }, true);
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <!-- Primary Meta Tags -->
    <title>Resumind | Análise ATS</title>
    <meta name="title" content="Resumind | Análise ATS" />
    <meta name="description" content="Otimização de currículos para sistemas ATS usando IA. Aumente suas chances de ser chamado para entrevistas." />
    <meta name="application-name" content="Resumind" />
    <meta name="apple-mobile-web-app-title" content="Resumind" />
    <link rel="canonical" href="https://resumind.site/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://resumind.site/" />
    <meta property="og:site_name" content="Resumind" />
    <meta property="og:title" content="Resumind | Análise ATS" />
    <meta property="og:description" content="Otimização de currículos para sistemas ATS usando IA. Aumente suas chances de ser chamado para entrevistas." />
    <meta property="og:image" content="https://resumind.site/favicon.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://resumind.site/" />
    <meta property="twitter:title" content="Resumind | Análise ATS" />
    <meta property="twitter:description" content="Otimização de currículos para sistemas ATS usando IA. Aumente suas chances de ser chamado para entrevistas." />
    <meta property="twitter:image" content="https://resumind.site/favicon.svg" />
  </head>
  <body style="background-color: #050505; color: #ffffff; margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
